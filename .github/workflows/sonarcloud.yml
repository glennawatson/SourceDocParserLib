name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze:
    name: Build, test, and analyze
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: zulu

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # Python is required by SourceDocParser.IntegrationTests' Zensical
      # render-smoke. The test creates its own venv at
      # tests/SourceDocParser.IntegrationTests/zensical/.venv on first run
      # and pip-installs zensical + pymdown-extensions into it; we just
      # need a system python3 for `python3 -m venv` to succeed.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarScanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sonar-scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarScanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/sonar-scanner"
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/sonar-scanner"

      - name: Restore
        working-directory: src
        run: dotnet restore SourceDocParserLib.slnx

      - name: Begin Sonar analysis
        working-directory: src
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          "${{ runner.temp }}/sonar-scanner/dotnet-sonarscanner" begin \
            /k:"glennawatson_SourceDocParserLib" \
            /o:"glennawatson" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.vscoveragexml.reportsPaths="**/TestResults/**/sonar-coverage.xml" \
            /d:sonar.coverage.exclusions="**/tests/**,**/benchmarks/**,**/tools/**"

      - name: Build
        working-directory: src
        run: dotnet build SourceDocParserLib.slnx --no-restore --configuration Release

      - name: Test with MTP coverage
        working-directory: src
        run: dotnet test --solution SourceDocParserLib.slnx --configuration Release --no-restore -- --coverage --coverage-output-format xml --coverage-output sonar-coverage.xml

      - name: End Sonar analysis
        working-directory: src
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          "${{ runner.temp }}/sonar-scanner/dotnet-sonarscanner" end \
            /d:sonar.token="${SONAR_TOKEN}"
